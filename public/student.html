<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Student — ClassCurio</title>

  <!-- PWA: manifest, icons, install hints. -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a1e33" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ClassCurio" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="/css/styles.css" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</head>
<body class="lockdown-body no-select" oncontextmenu="return false;">
  <div class="topbar" style="background:#1a1e33; color:#fff; border-bottom-color:#2b3152;">
    <div class="brand">ClassCurio</div>
    <span class="muted" style="color:#9ba0bd;">Student view</span>
    <div class="spacer"></div>
    <span id="who" class="muted" style="color:#9ba0bd;"></span>
    <button id="logout" class="btn">Sign out</button>
  </div>

  <div class="container">
    <!-- LIST VIEW -->
    <div id="list-view">
      <h1>My dashboard</h1>
      <div id="assessments"></div>
      <div id="past-results" style="margin-top: 24px;"></div>
    </div>

    <!-- CONSENT VIEW -->
    <div id="consent-view" style="display:none;">
      <div class="panel">
        <h1 id="consent-title"></h1>
        <p id="consent-desc" class="muted"></p>
        <p><strong>Duration:</strong> <span id="consent-duration"></span></p>

        <!-- Warning banner with violation rules. Bilingual (English + regional). -->
        <div id="consent-rules"></div>

        <!-- Mandatory camera permission gate. Students must grant camera access
             before they can click "I understand — start". -->
        <div id="camera-gate" class="panel" style="margin: 14px 0; padding: 14px 18px; background: #fef3c7; border: 2px solid #f59e0b; color: #92400e;">
          <div style="font-weight: 600; margin-bottom: 6px;">📷 Camera permission required</div>
          <div style="font-size: 14px; margin-bottom: 10px;">This assessment is proctored. You must allow camera access to enter. Your camera must remain on for the entire test.</div>
          <button id="camera-grant-btn" class="btn primary">Enable camera</button>
          <span id="camera-gate-status" style="margin-left: 10px; font-size: 13px;"></span>
        </div>

        <div id="env-check" class="muted" style="margin: 10px 0;"></div>

        <div class="row">
          <button id="consent-back" class="btn">Cancel</button>
          <div class="spacer"></div>
          <button id="consent-start" class="btn primary" disabled style="opacity: 0.5; cursor: not-allowed;">I understand — start</button>
        </div>
      </div>
    </div>

    <!-- ASSESSMENT VIEW -->
    <div id="assessment-view" style="display:none;" class="assessment-content">
      <div class="row" style="margin-bottom: 10px;">
        <h1 id="assess-title" style="margin:0; color:#fff;"></h1>
        <div class="spacer"></div>
        <div id="timer" class="timer">--:--</div>
      </div>

      <div id="violation-banner" class="violation-banner" style="display:none;"></div>

      <!-- Webcam proctor preview (bottom-right corner) -->
      <div id="webcam-wrap">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="webcam-status">REC</div>
      </div>
      <canvas id="webcam-canvas" style="display:none;"></canvas>

      <!-- Reading passage (shown above questions when the teacher attached one) -->
      <div id="passage-panel" class="panel" style="display:none; max-height: 320px; overflow-y: auto; background:#1a1e33; color:#eef0ff; border-color:#2b3152;">
        <h2 style="margin-top:0; color:#fff;">Reading passage</h2>
        <div id="passage-text" style="white-space: pre-wrap; line-height: 1.55;"></div>
      </div>

      <div id="questions"></div>

      <div class="panel" style="text-align:center;">
        <button id="submit-btn" class="btn primary">Submit assessment</button>
      </div>
    </div>

    <!-- DONE VIEW -->
    <div id="done-view" style="display:none;">
      <div class="panel">
        <h1>Submitted</h1>
        <p id="done-msg" class="muted"></p>
        <div class="row" style="margin-top: 12px;">
          <button id="done-review" class="btn primary">View my answers and feedback</button>
          <div class="spacer"></div>
          <button id="done-back" class="btn">Back to assessments</button>
        </div>
      </div>
    </div>

    <!-- REVIEW VIEW -->
    <div id="review-view" style="display:none;">
      <div class="row" style="margin-bottom: 10px;">
        <h1 id="review-title" style="margin:0;"></h1>
        <div class="spacer"></div>
        <button id="review-back" class="btn">Back</button>
      </div>
      <div class="panel" id="review-summary"></div>
      <div id="review-body"></div>
    </div>
  </div>

  <script src="/js/student.js"></script>
</body>
</html>
